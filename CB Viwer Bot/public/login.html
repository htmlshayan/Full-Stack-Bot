<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEY CB BOT | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 20px rgba(99,102,241,0.6));
        }

        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #818cf8, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .login-logo p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: rgba(99,102,241,0.7);
            background: rgba(99,102,241,0.08);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .form-group input::placeholder { color: rgba(255,255,255,0.2); }

        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(99,102,241,0.4);
        }

        .btn-login:hover { opacity: 0.9; box-shadow: 0 6px 20px rgba(99,102,241,0.5); }
        .btn-login:active { transform: scale(0.98); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #f87171;
            font-size: 0.85rem;
            padding: 0.65rem 1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .error-msg.visible { display: block; animation: shake 0.3s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin: 1.5rem 0 0;
        }

        .footer-note {
            text-align: center;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.2);
            margin-top: 1rem;
        }

        @media (max-width: 600px) {
            body {
                padding: 1.5rem 1rem;
                align-items: flex-start;
                overflow: auto;
            }

            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }

            .login-logo h1 {
                font-size: 1.25rem;
            }

            .login-logo .icon {
                font-size: 2rem;
            }
        }

        @media (max-width: 420px) {
            .login-card {
                padding: 1.5rem 1.25rem;
            }

            .form-group input {
                padding: 0.7rem 0.9rem;
            }

            .btn-login {
                padding: 0.75rem;
            }

            .footer-note {
                font-size: 0.68rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <span class="icon">🚀</span>
            <h1>BEY CB BOT</h1>
            <p>Control Panel · Secure Access</p>
        </div>

        <div class="error-msg" id="error-msg">Invalid username or password.</div>

        <form id="login-form" autocomplete="off">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="btn-login">Sign In</button>
        </form>

        <hr class="divider">
        <p class="footer-note">BEY CB BOT © 2025 · All rights reserved</p>
    </div>

    <script>
        // If already authenticated, skip login
        const storage = {
            get: (key) => {
                try { return localStorage.getItem(key) || ''; }
                catch (err) { return ''; }
            },
            set: (key, value) => {
                try { localStorage.setItem(key, value); return true; }
                catch (err) { return false; }
            }
        };

        const checkSession = async () => {
            const token = storage.get('auth_token');
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
            try {
                const res = await fetch('/api/session', { headers, credentials: 'same-origin' });
                if (res.ok) window.location.replace('/');
            } catch (err) {}
        };

        checkSession();

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const errMsg = document.getElementById('error-msg');
            errMsg.classList.remove('visible');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    const stored = storage.set('auth_token', data.token);
                    if (!stored) { console.warn('localStorage blocked; using cookie auth'); }
                    window.location.replace('/');
                } else {
                    errMsg.textContent = data.message || 'Invalid credentials.';
                    errMsg.classList.add('visible');
                }
            } catch (err) {
                errMsg.textContent = 'Server error. Try again.';
                errMsg.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        };
    </script>
</body>
</html>
